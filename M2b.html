            .atividade-temas {
                position: relative;

            .tema-btn {
                position: absolute;
                width: 180px;
                height: 75px;
                background: #bc4b2d;
                color: #fff;
                border: none;
                font-size: 1.2rem;
                font-weight: 700;
                cursor: pointer;
                transition: .3s;
                z-index: 2;
            }

            /* Botão selecionado */
            .tema-btn.ativo {
                background: #e5ddd3;
                color: #bc4b2d;
            }

            .tema-btn.ativo::after {
                border-top-color: #9b7551;
            }

            .tema-btn:hover {
                transform: scale(1.05);
            }

            /* Aba lateral */
            .tema-btn::after {
                content: "";
                position: absolute;
                bottom: -32px;
                width: 0;
                height: 0;
            }

            .esquerda::after {
                left: 0;
                border-top: 32px solid #9b7551;
                border-right: 90px solid transparent;
            }

            .direita::after {
                right: 0;
                border-top: 32px solid #9b7551;
                border-left: 90px solid transparent;
            }

            /* Posições */
            .tema1 {
                top: 50px;
                left: -50px;
            }

            .tema2 {
                top: 190px;
                left: -50px;
            }

            .tema3 {
                top: 330px;
                left: -50px;
            }

            .tema4 {
                top: 120px;
                right: -50px;
            }

            .tema5 {
                top: 260px;
                right: -50px;
            }

            /* Mobile */
            @media (max-width: 991px) {

                .atividade-temas {
                    padding-top: 20px;
                }

                .painel-conteudo {
                    min-height: 350px;
                }

                .texto-centro {
                    font-size: 1.3rem;
                }

                .tema-btn {
                    position: static;
                    display: block;
                    margin: 15px auto;
                }

                .tema-btn::after {
                    display: none;
                }
            }

<script>
    const textos = [
        "Dialogar com a sua equipe sobre redução de danos utilizando do material de apoio abaixo como possível disparador.",
        "Selecionar um usuário de álcool e/ou outras drogas que vem apresentando dificuldades quanto ao seu acompanhamento psicossocial.",
        "Realizar busca ativa e/ou agendamento de encontro do usuário com a equipe para a construção conjunta do Projeto terapêutico singular orientado pela redução de danos. A pessoa deve ser estimulada a convidar amigos, familiares ou outras pessoas de sua rede de apoio.",
        "Dialogar sobre o contexto de uso que a pessoa estabelece. Identifique situações de vulnerabilidades, de proteção, danos associados ao uso, consequências indesejáveis, estratégias bem-sucedidas etc.",
        "Pactuar estratégias para reduzir os danos para cada contexto de uso, especialmente a partir das vulnerabilidades e dos riscos que podem surgir.",
        "Realizar articulação intersetorial a partir do projeto terapêutico singular, convidando outros atores e instituições para a proposta de cuidado desenhada com a pessoa e sua rede de apoio.",
        "Compactuar formas de avaliar os efeitos do PTS, modificar as estratégias construídas, mobilizar próximos encontros e reuniões com a equipe de referência, o usuário e sua rede de apoio."
    ];

    document.querySelectorAll('.numero').forEach((btn, index) => {

        btn.addEventListener('click', () => {

            document.querySelectorAll('.numero')
                .forEach(b => b.classList.remove('ativo'));

            btn.classList.add('ativo');

            document.querySelector('.atividade-conteudo p')
                .innerHTML = textos[index];
        });



    });

    function alterarTema(botao, titulo, texto) {

        // Remove seleção anterior
        document.querySelectorAll('.tema-btn').forEach(btn => {
            btn.classList.remove('ativo');
        });

        // Marca o botão clicado
        botao.classList.add('ativo');

        // Atualiza conteúdo
        document.getElementById("textoTema").innerHTML = `
        <h2>${titulo}</h2>
        <p>${texto}</p>
    `;
    }
</script>
